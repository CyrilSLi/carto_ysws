<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carto YSWS</title>
    <script src="https://cdn.jsdelivr.net/npm/maptalks@1/dist/maptalks.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maptalks@1/dist/maptalks.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
        }
        #map {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="map">
    </div>
    <script>
        const map = new maptalks.Map("map", {
            center: [0, 0],
            spacialReference: "IDENTITY",
            zoom: 0,
            maxZoom: 24,
            baseLayer: new maptalks.TileLayer("base", {
                urlTemplate: "/tile/{z}/{y}/{x}.png",
                maxAvailableZoom: 6
            })
        });

        returnHome = function () {
            map.fitExtent(new maptalks.Extent(-32, -64, 32, 64));
        }
        returnHome();
        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                returnHome();
            }
        });
    </script>
</body>
</html>
