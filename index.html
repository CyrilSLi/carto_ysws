<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carto YSWS</title>
    <script src="https://cdn.jsdelivr.net/npm/maptalks@1/dist/maptalks.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.138.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/maptalks.three@0/dist/maptalks.three.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/maptalks@1/dist/maptalks.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
        }
        #map {
            flex: 1;
        }
    </style>
</head>
<body>
    <div id="map">
    </div>
    <script>
        const map = new maptalks.Map("map", {
            center: [0, 0],
            zoom: 0,
            maxZoom: 24,
            baseLayer: new maptalks.TileLayer("base", {
                urlTemplate: "tile/{z}/{y}/{x}.png",
                maxAvailableZoom: 6
            })
        });

        function pixelCoords(x, y) {
            // originX and originY are in the range of [-1, 1]
            originX = (x - 4096) / 8192;
            originY = (-y + 8192) / 8192;
            return maptalks.projection.EPSG3857.unproject(new maptalks.Coordinate(originX * Math.PI * 6378137, originY * Math.PI * 6378137));
        }

        function flyAndFlatten(x1, y1, x2, y2) {
            map.flyTo({
                zoom: map.getFitZoom(new maptalks.Extent(pixelCoords(x1, y1), pixelCoords(x2, y2))),
                center: pixelCoords((x1 + x2) / 2, (y1 + y2) / 2),
                pitch: 0,
                bearing: 0
            }, {
                duration: 500
            });
        }



        function quickAccessMarker(x, y, targetX1, targetY1, targetX2, targetY2) {
            return new maptalks.Marker(pixelCoords(x, y), {
                symbol: {
                    markerFile: "images/pin-fill.svg",
                    markerWidth: 50,
                    markerHeight: 50,
                }
            }).addEventListener("click", flyAndFlatten.bind(null, targetX1, targetY1, targetX2, targetY2));
        }

        const quickAccess = [
            quickAccessMarker(4096             , 2025 + 8192 + 100,  1630,        8192,       6560,               8192 + 4096),
            quickAccessMarker(2460 + 0    + 100, 1436 + 8192 + 100,  -4096 + 50,  128,        -4096 + 50 + 5580,  928 + 7000),
            quickAccessMarker(1436 + 4096 + 100, 1436 + 8192 + 100,  4096 + 2562, 128,        4096 + 2562 + 5580, 928 + 7000),
            quickAccessMarker(2460 + 0    + 100, 2460 + 8192 + 100,  -4096 + 50,  8192 + 256, -4096 + 50 + 5580,  8192 + 1142 + 7000),
            quickAccessMarker(1436 + 4096 + 100, 2460 + 8192 + 100,  4096 + 2562, 8192 + 256, 4096 + 2562 + 5580, 8192 + 1142 + 7000)
        ];
        new maptalks.VectorLayer("quickAccess", quickAccess, {
            zIndex: 1000
        }).addTo(map);



        const buttonsLayer = new maptalks.ThreeLayer("linkButtons").addTo(map);
        const wallMaterial = new THREE.MeshBasicMaterial({ color: 0x000000, opacity: 0.5, transparent: true });
        const textureLoader = new THREE.TextureLoader();

        linkButtons = [ // x, y, xSize, ySize, height, url
            [-1500 + 4096, 2400 + 4096,  3000, 600, 10240, "placeholder_3000x600"],

            [100 - 4096,   3082 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],
            [3480 - 4096,  3082 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],
            [100 - 4096,   3482 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],
            [3480 - 4096,  3482 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],

            [2612 + 4096,  3082 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],
            [1896 + 8192,  3082 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],
            [2612 + 4096,  3482 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],
            [1896 + 8192,  3482 + 4096,  2100, 300, 5120,  "placeholder_2100x300"],

            [100 - 4096,   3296 + 12288, 2100, 300, 5120,  "placeholder_2100x300"],
            [3480 - 4096,  3296 + 12288, 2100, 300, 5120,  "placeholder_2100x300"],
            [100 - 4096,   3696 + 12288, 2100, 300, 5120,  "placeholder_2100x300"],
            [3480 - 4096,  3696 + 12288, 2100, 300, 5120,  "placeholder_2100x300"],

            [2612 + 4096,  3296 + 12288, 2100, 300, 5120,  "placeholder_2100x300"],
            [1896 + 8192,  3296 + 12288, 2100, 300, 5120,  "placeholder_2100x300"],
            [2612 + 4096,  3696 + 12288, 2100, 300, 5120,  "placeholder_2100x300"],
            [1896 + 8192,  3696 + 12288, 2100, 300, 5120,  "placeholder_2100x300"]
        ]

        const loadedTextures = {};
        buttonsLayer.prepareToDraw = function(gl, scene, camera) {
            scene.add(new THREE.AmbientLight());
            linkButtons.forEach(([x, y, xSize, ySize, height, url]) => {
                const buttonExtent = new maptalks.Extent(pixelCoords(x, y), pixelCoords(x + xSize, y + ySize));
                const imageURL = `images/${url.replace(/[^a-zA-Z0-9]/g, "_")}.png`;
                if (!loadedTextures[imageURL]) {
                    loadedTextures[imageURL] = textureLoader.load(imageURL);
                    console.log(`Loaded texture: ${imageURL}`);
                }
                const image = new ImagePlane(buttonExtent, {
                    altitude: height,
                    imageWidth: xSize,
                    imageHeight: ySize,
                }, loadedTextures[imageURL], buttonsLayer);
                this.addMesh(image);

                const geoParams = image.geometry.parameters;
                const frontBackWalls = new THREE.PlaneGeometry(geoParams.width, height);
                const frontWall = new THREE.Mesh(frontBackWalls, wallMaterial);
                frontWall.position.set(0, -geoParams.height / 2, height / 2);
                frontWall.rotation.x = Math.PI / 2;
                const backWall = new THREE.Mesh(frontBackWalls, wallMaterial);
                backWall.position.set(0, geoParams.height / 2, height / 2);
                backWall.rotation.x = -Math.PI / 2;

                const leftRightWalls = new THREE.PlaneGeometry(geoParams.height, height);
                const leftWall = new THREE.Mesh(leftRightWalls, wallMaterial);
                leftWall.position.set(-geoParams.width / 2, 0, height / 2);
                leftWall.rotation.x = Math.PI / 2;
                leftWall.rotation.y = -Math.PI / 2;
                const rightWall = new THREE.Mesh(leftRightWalls, wallMaterial);
                rightWall.position.set(geoParams.width / 2, 0, height / 2);
                rightWall.rotation.x = Math.PI / 2;
                rightWall.rotation.y = Math.PI / 2;

                const wallGroup = new THREE.Group();
                wallGroup.add(frontWall, backWall, leftWall, rightWall);
                wallGroup.position.copy(this.coordinateToVector3(buttonExtent.getCenter(), 0));
                scene.add(wallGroup);

                image.addEventListener("click", () => {
                    window.open(url, "_blank");
                });
                console.log(`Added button at (${x}, ${y}) with size ${xSize}x${ySize}`);
            });
            this.prepareToDraw = null;
            flyAndFlatten(1630, 3940, 6560, 12440);
        };

        // https://github.com/maptalks/maptalks.three/blob/master/demo/custom-imageplane.html
        class ImagePlane extends maptalks.BaseObject {
            constructor(extent, options, texture, layer) {
                options = maptalks.Util.extend({}, options, { layer, extent });
                const { altitude, imageHeight, imageWidth, factor, filterIndex } = options;
                const { xmin, ymin, xmax, ymax } = extent;
                const coords = [
                    [xmin, ymin],
                    [xmin, ymax],
                    [xmax, ymax],
                    [xmax, ymin]
                ];
                let vxmin = Infinity, vymin = Infinity, vxmax = -Infinity, vymax = -Infinity;
                coords.forEach(coord => {
                    const v = layer.coordinateToVector3(coord);
                    const { x, y } = v;
                    vxmin = Math.min(x, vxmin);
                    vymin = Math.min(y, vymin);
                    vxmax = Math.max(x, vxmax);
                    vymax = Math.max(y, vymax);
                });
                const w = Math.abs(vxmax - vxmin), h = Math.abs(vymax - vymin);
                const material = new THREE.MeshBasicMaterial();
                material.map = texture;
                material.opacity = 1;
                material.transparent = true;
                material.needsUpdate = true;

                const geometry = new THREE.PlaneGeometry(w, h, imageWidth - 1, imageHeight - 1);
                super();
                this.geometry = geometry;
                this._initOptions(options);
                this._createMesh(geometry, material);
                const v = layer.coordinateToVector3(extent.getCenter(), altitude);
                this.getObject3d().position.copy(v);
            }
        }
    </script>
</body>
</html>
